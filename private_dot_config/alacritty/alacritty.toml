general.import = [
  "~/.config/alacritty/themes/themes/doom_one.toml"
]

[env]
TERM = "xterm-256color"

[font]
# Font size in points.
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Heavy"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Heavy Italic"

[colors.primary]
background = "0x282828"
foreground = "0xebdbb2"

#[colors.normal]
#black   = "0x282828"
#red     = "0xcc241d"
#green   = "0x98971a"
#yellow  = "0xd79921"
#blue    = "0x458588"
#magenta = "0xb16286"
#cyan    = "0x689d6a"
#white   = "0xa89984"

#[colors.bright]
#black   = "0x928374"
#red     = "0xfb4934"
#green   = "0xb8bb26"
#yellow  = "0xfabd2f"
#blue    = "0x83a598"
#magenta = "0xd3869b"
#cyan    = "0x8ec07c"
#white   = "0xebdbb2"

[window]
opacity = 0.70
blur = true
# decorations = "Buttonless"
# startup_mode = "Fullscreen"
dynamic_title = true
option_as_alt = "Both"

[scrolling]
history = 10000

[terminal]
osc52 = "CopyPaste"
